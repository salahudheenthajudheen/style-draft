<head>
  <meta charset="UTF-8" />

  <title>Style Draft | AI-Assisted Smart Outfit Designer</title>
  <meta name="description"
    content="Style Draft - AI-Assisted Smart Outfit Designer. Design unique outfits, experiment with color palettes, and draft your signature look seamlessly." />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    (function () {
      if (typeof window.FormData !== 'undefined' && !window.FormData.prototype.keys) {
        window.FormData.prototype.keys = function* () { };
      }
      const globalProxy = new Proxy(window, {
        set(target, prop, value) {
          if (prop === 'fetch') {
            console.warn('Attempt to overwrite fetch ignored');
            return true;
          }
          try {
            target[prop] = value;
          } catch (e) { }
          return true;
        },
        get(target, prop) {
          const val = target[prop];
          if (typeof val === 'function') {
            if (val.prototype) return val;
            return val.bind(target);
          }
          return val;
        }
      });
      window.global = globalProxy;
      try {
        Object.defineProperty(window, 'globalThis', {
          get() { return globalProxy; },
          configurable: true
        });
      } catch (e) { }
    })();
  </script>
</head>

  <script type="module" src="/src/main.tsx"></script>
